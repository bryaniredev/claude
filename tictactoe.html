<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: white;
      color: black;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 1px;
      margin-bottom: 30px;
      text-align: center;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 20px;
      height: 1.5em;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
    }

    .cell {
      width: 100px;
      height: 100px;
      border: 3px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.1s;
    }

    .cell:hover:not(.taken) {
      background-color: #f0f0f0;
    }

    .cell.taken {
      cursor: default;
    }

    /* Remove double borders by collapsing */
    .cell:nth-child(1), .cell:nth-child(2), .cell:nth-child(3) { border-top: none; }
    .cell:nth-child(7), .cell:nth-child(8), .cell:nth-child(9) { border-bottom: none; }
    .cell:nth-child(1), .cell:nth-child(4), .cell:nth-child(7) { border-left: none; }
    .cell:nth-child(3), .cell:nth-child(6), .cell:nth-child(9) { border-right: none; }

    #reset {
      margin-top: 30px;
      padding: 10px 30px;
      font-size: 1rem;
      font-family: 'Georgia', serif;
      background-color: black;
      color: white;
      border: none;
      cursor: pointer;
      letter-spacing: 1px;
    }

    #reset:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <h1>Welcome to the World of Xs and Os</h1>
  <div id="status">Player X's turn</div>
  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>
  <button id="reset">New Game</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diagonals
    ];

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return board[a];
        }
      }
      return board.every(Boolean) ? 'draw' : null;
    }

    function handleClick(e) {
      const idx = parseInt(e.target.dataset.index);
      if (gameOver || board[idx]) return;

      board[idx] = currentPlayer;
      e.target.textContent = currentPlayer;
      e.target.classList.add('taken');

      const result = checkWinner();
      if (result === 'draw') {
        status.textContent = "It's a draw!";
        gameOver = true;
      } else if (result) {
        status.textContent = `Player ${result} wins!`;
        gameOver = true;
      } else {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        status.textContent = `Player ${currentPlayer}'s turn`;
      }
    }

    function reset() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      status.textContent = "Player X's turn";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.classList.remove('taken');
      });
    }

    cells.forEach(cell => cell.addEventListener('click', handleClick));
    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
